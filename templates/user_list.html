{% extends 'base.html' %}
{% block content %}
<h1>Список пользователей</h1>
<table class="table">
    <thead>
        <tr>
            <th>Имя</th>
            <th>Email</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>
                <a href="{% url 'user_update' user.pk %}">Изменить</a>
                <a href="{% url 'user_delete' user.pk %}">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'user_create' %}">Создать пользователя</a>
{% endblock %}
