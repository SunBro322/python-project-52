{% extends 'base.html' %}
{% block content %}
<h1>Удаление статуса</h1>
<p>Вы уверены, что хотите удалить статус <strong>{{ object.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'statuses' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
