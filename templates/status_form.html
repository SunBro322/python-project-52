{% extends 'base.html' %}
{% block content %}
<h1>{% if object %}Изменить статус{% else %}Новый статус{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'statuses' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
