{% extends 'base.html' %}
{% load bootstrap5 %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h1 class="card-title text-danger">Удаление пользователя</h1>
            <hr>
            <form method="post">
                {% csrf_token %}
                <p>Вы уверены, что хотите удалить пользователя <strong>{{ object.username }}</strong>?</p>
                <div class="mt-4">
                    <button type="submit" class="btn btn-danger me-2">
                        <i class="bi bi-trash"></i> Да, удалить
                    </button>
                    <a href="{% url 'users' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
